name: pmsec release pypi
# Only dispatched by the `pmsec release` workflow. No tag trigger: release
# tags are pushed with GITHUB_TOKEN (which never triggers workflows), so a
# tag-triggered run could only ever be a manual tag push — blocked by design.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.12.0)'
        required: true
permissions:
  contents: read
  id-token: write
  attestations: write
jobs:
  publish:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/pmsec/
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        timeout-minutes: 5
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        timeout-minutes: 5
      - name: Block direct manual dispatch
        timeout-minutes: 1
        env:
          ACTOR: ${{ github.actor }}
        run: |
          [ "$ACTOR" = "github-actions[bot]" ] || { echo "publish runs only via the 'pmsec release' workflow (actor: $ACTOR)" >&2; exit 1; }
      - name: Test
        timeout-minutes: 5
        run: uv run --with pytest pytest -q
      - name: Build
        timeout-minutes: 5
        run: uv build
      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        timeout-minutes: 5
        with:
          subject-path: 'python/dist/*'
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        timeout-minutes: 5
        with:
          packages-dir: python/dist
