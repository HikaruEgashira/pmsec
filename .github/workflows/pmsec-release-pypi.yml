name: pmsec release pypi
# Only dispatched by the `pmsec release` workflow. No tag trigger: release
# tags are pushed with GITHUB_TOKEN (which never triggers workflows), so a
# tag-triggered run could only ever be a manual tag push — blocked by design.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.12.0)'
        required: true
permissions:
  contents: read
  id-token: write
  attestations: write
jobs:
  publish:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/pmsec/
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        timeout-minutes: 5
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        timeout-minutes: 5
      - name: Block direct manual dispatch
        timeout-minutes: 1
        env:
          ACTOR: ${{ github.actor }}
        run: |
          [ "$ACTOR" = "github-actions[bot]" ] || { echo "publish runs only via the 'pmsec release' workflow (actor: $ACTOR)" >&2; exit 1; }
      - name: Verify requested version matches pyproject.toml
        timeout-minutes: 5
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          pkg_version=$(awk -F\" '/^version *= */ {print $2; exit}' pyproject.toml)
          [ "$INPUT_VERSION" = "$pkg_version" ] || { echo "input $INPUT_VERSION != pyproject.toml $pkg_version" >&2; exit 1; }
      - name: Verify all implementations agree on the version
        timeout-minutes: 1
        working-directory: .
        run: bash scripts/check-versions.sh
      - name: Test
        timeout-minutes: 5
        run: uv run --with pytest pytest -q
      - name: Build
        timeout-minutes: 5
        run: uv build
      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        timeout-minutes: 5
        with:
          subject-path: 'python/dist/*'
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        timeout-minutes: 5
        with:
          packages-dir: python/dist
