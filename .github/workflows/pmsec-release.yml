name: pmsec release
on:
  workflow_run:
    workflows: ["pmsec ci"]
    types: [completed]
    branches: [main]
  workflow_dispatch: {}
permissions:
  contents: write
  actions: write
jobs:
  release:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        timeout-minutes: 5
        with:
          ref: main
          fetch-depth: 0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        timeout-minutes: 5
      - name: Determine next version
        id: version
        timeout-minutes: 1
        run: |
          latest=$(git tag --list 'pmsec-node-v*' --sort=-v:refname | head -1)
          intree=$(awk -F'"' '/"version":/ {print $4; exit}' node/package.json)

          if [ -z "$latest" ]; then
            tag_ver="0.0.0"
          else
            tag_ver="${latest#pmsec-node-v}"
          fi

          IFS='.' read -r major minor patch <<< "$tag_ver"
          auto_next="$major.$minor.$((patch + 1))"

          # Use in-tree version if strictly newer than latest tag (manual bump);
          # otherwise auto-increment patch.
          higher=$(printf '%s\n%s' "$tag_ver" "$intree" | sort -V | tail -1)
          if [ "$higher" = "$intree" ] && [ "$intree" != "$tag_ver" ]; then
            next="$intree"
            echo "Using in-tree version $next (manual bump detected; latest tag: $tag_ver)"
          else
            next="$auto_next"
            echo "Auto-incrementing to $next (latest tag: ${latest:-none})"
          fi

          echo "version=$next" >> "$GITHUB_OUTPUT"
      - name: Bump all version declarations
        timeout-minutes: 5
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: bash scripts/bump.sh "$VERSION"
      - name: Commit, tag, push
        timeout-minutes: 5
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "chore: release v$VERSION"
          git tag "pmsec-node-v$VERSION"
          git tag "pmsec-py-v$VERSION"
          git push origin HEAD:main "pmsec-node-v$VERSION" "pmsec-py-v$VERSION"
      - name: Dispatch publish workflows
        timeout-minutes: 5
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh workflow run pmsec-release-npm.yml --ref main -f version="$VERSION"
          gh workflow run pmsec-release-pypi.yml --ref main -f version="$VERSION"
