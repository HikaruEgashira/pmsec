name: pmsec release
on:
  workflow_run:
    workflows: ["pmsec ci"]
    types: [completed]
    branches: [main]
  workflow_dispatch: {}
permissions:
  contents: write
  actions: write
jobs:
  release:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        timeout-minutes: 5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - name: Detect version
        id: detect
        timeout-minutes: 1
        run: |
          version=$(awk -F'"' '/"version":/ {print $4; exit}' node/package.json)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Detected version: $version"
      - name: Check if release needed
        id: check
        timeout-minutes: 1
        env:
          VERSION: ${{ steps.detect.outputs.version }}
        run: |
          if git ls-remote --tags origin "refs/tags/pmsec-node-v$VERSION" | grep -q .; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "Tag pmsec-node-v$VERSION already exists — skipping release"
          else
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "Tag pmsec-node-v$VERSION not found — will release"
          fi
      - name: Verify all implementations agree
        if: steps.check.outputs.release == 'true'
        timeout-minutes: 1
        run: bash scripts/check-versions.sh
      - name: Create and push tags
        if: steps.check.outputs.release == 'true'
        timeout-minutes: 5
        env:
          VERSION: ${{ steps.detect.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "pmsec-node-v$VERSION"
          git tag "pmsec-py-v$VERSION"
          git push origin "pmsec-node-v$VERSION" "pmsec-py-v$VERSION"
      - name: Dispatch publish workflows
        if: steps.check.outputs.release == 'true'
        timeout-minutes: 5
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.detect.outputs.version }}
        run: |
          gh workflow run pmsec-release-npm.yml --ref main -f version="$VERSION"
          gh workflow run pmsec-release-pypi.yml --ref main -f version="$VERSION"
