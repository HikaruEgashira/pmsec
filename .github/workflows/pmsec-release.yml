name: pmsec release
on:
  workflow_run:
    workflows: ["pmsec ci"]
    types: [completed]
    branches: [main]
  workflow_dispatch: {}
permissions:
  contents: write
  actions: write
jobs:
  release:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        timeout-minutes: 5
        with:
          ref: main
          fetch-depth: 0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        timeout-minutes: 5
      - name: Determine next CalVer version
        id: version
        timeout-minutes: 1
        run: |
          prefix=$(date -u +%Y.%-m)
          latest=$(git tag --list "pmsec-node-v${prefix}.*" --sort=-v:refname | head -1)
          if [ -z "$latest" ]; then
            next="${prefix}.0"
          else
            n="${latest##*.}"
            next="${prefix}.$((n + 1))"
          fi
          echo "version=$next" >> "$GITHUB_OUTPUT"
          echo "Next version: $next (prefix: $prefix, latest tag in month: ${latest:-none})"
      - name: Bump all version declarations
        timeout-minutes: 5
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          perl -pi -e 's/^(  "version": ")[^"]+/${1}'"$VERSION"'/' node/package.json
          perl -pi -e 's/^(version = ")[^"]+/${1}'"$VERSION"'/' python/pyproject.toml
          perl -pi -e 's/^(PMSEC_VERSION=")[^"]+/${1}'"$VERSION"'/' bash/pmsec
          perl -pi -e "s/(PmsecVersion = ')[^']+/\${1}$VERSION/" powershell/pmsec.ps1
          (cd python && uv lock --quiet)
      - name: Commit, tag, push
        timeout-minutes: 5
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "chore: release v$VERSION"
          git tag "pmsec-node-v$VERSION"
          git tag "pmsec-py-v$VERSION"
          git push origin HEAD:main "pmsec-node-v$VERSION" "pmsec-py-v$VERSION"
      - name: Dispatch publish workflows
        timeout-minutes: 5
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh workflow run pmsec-release-npm.yml --ref main -f version="$VERSION"
          gh workflow run pmsec-release-pypi.yml --ref main -f version="$VERSION"
