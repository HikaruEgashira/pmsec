name: pmsec ci
on:
  push:
    branches: [main]
    paths:
      - 'node/**'
      - 'python/**'
      - 'bash/**'
      - 'powershell/**'
      - 'conformance/**'
      - '.github/workflows/pmsec-ci.yml'
  pull_request:
    paths:
      - 'node/**'
      - 'python/**'
      - 'bash/**'
      - 'powershell/**'
      - 'conformance/**'
      - '.github/workflows/pmsec-ci.yml'
permissions: {}
jobs:
  node:
    timeout-minutes: 10
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [22, 24]
    defaults:
      run:
        working-directory: node
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 5
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        timeout-minutes: 5
        with:
          node-version: ${{ matrix.node }}
      - timeout-minutes: 5
        run: node --test
  python:
    timeout-minutes: 10
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ['3.10', '3.11', '3.12', '3.13']
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 5
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        timeout-minutes: 5
      - name: pytest
        timeout-minutes: 5
        env:
          PY_VERSION: ${{ matrix.python }}
        run: uv run --python "$PY_VERSION" --with pytest pytest -q
  bash:
    timeout-minutes: 10
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    defaults:
      run:
        working-directory: bash
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 5
        with:
          persist-credentials: false
      - name: bash --version
        timeout-minutes: 1
        run: bash --version
      - name: test
        timeout-minutes: 5
        run: bash test/test.sh
  powershell:
    timeout-minutes: 10
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, shell: pwsh }
          - { os: windows-latest, shell: powershell }
          - { os: ubuntu-latest,  shell: pwsh }
          - { os: macos-latest,   shell: pwsh }
    defaults:
      run:
        working-directory: powershell
        shell: ${{ matrix.shell }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 5
        with:
          persist-credentials: false
      - name: shell version
        timeout-minutes: 1
        run: $PSVersionTable | Format-List
      - name: test
        timeout-minutes: 5
        run: ${{ matrix.shell }} -NoProfile -File test/test.ps1
  conformance:
    timeout-minutes: 10
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, impl: bash }
          - { os: macos-latest,  impl: bash }
          - { os: ubuntu-latest, impl: node }
          - { os: macos-latest,  impl: node }
          - { os: ubuntu-latest, impl: python }
          - { os: macos-latest,  impl: python }
          - { os: windows-latest, impl: powershell }
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 5
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        if: matrix.impl == 'node'
        timeout-minutes: 5
        with:
          node-version: 22
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.0.0
        timeout-minutes: 5
        with:
          python-version: '3.12'
      - name: run conformance
        timeout-minutes: 5
        env:
          IMPL: ${{ matrix.impl }}
        run: |
          if [ "$IMPL" = "python" ]; then
            export PYTHONPATH="$PWD/python/src"
          fi
          python3 conformance/run.py --impl "$IMPL"
        shell: bash
