name: pmsec ci

on:
  push:
    branches: [main]
    paths:
      - 'node/**'
      - 'python/**'
      - '.github/workflows/pmsec-ci.yml'
  pull_request:
    paths:
      - 'node/**'
      - 'python/**'
      - '.github/workflows/pmsec-ci.yml'

jobs:
  node:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18, 20, 22]
    defaults:
      run:
        working-directory: node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: node --test "test/**/*.test.mjs"

  python:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ['3.10', '3.11', '3.12', '3.13']
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv run --python ${{ matrix.python }} --with pytest pytest -q
