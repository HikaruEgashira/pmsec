name: pmsec ci
on:
  push:
    branches: [main]
    paths:
      - 'node/**'
      - 'python/**'
      - 'bash/**'
      - 'powershell/**'
      - '.github/workflows/pmsec-ci.yml'
  pull_request:
    paths:
      - 'node/**'
      - 'python/**'
      - 'bash/**'
      - 'powershell/**'
      - '.github/workflows/pmsec-ci.yml'
permissions: {}
jobs:
  node:
    timeout-minutes: 10
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [22, 24]
    defaults:
      run:
        working-directory: node
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 5
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        timeout-minutes: 5
        with:
          node-version: ${{ matrix.node }}
      - timeout-minutes: 5
        run: node --test
  python:
    timeout-minutes: 10
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ['3.10', '3.11', '3.12', '3.13']
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 5
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        timeout-minutes: 5
      - name: pytest
        timeout-minutes: 5
        env:
          PY_VERSION: ${{ matrix.python }}
        run: uv run --python "$PY_VERSION" --with pytest pytest -q
  bash:
    timeout-minutes: 10
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    defaults:
      run:
        working-directory: bash
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 5
        with:
          persist-credentials: false
      - name: bash --version
        timeout-minutes: 1
        run: bash --version
      - name: test
        timeout-minutes: 5
        run: bash test/test.sh
  powershell:
    timeout-minutes: 10
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, shell: pwsh }
          - { os: windows-latest, shell: powershell }
          - { os: ubuntu-latest,  shell: pwsh }
          - { os: macos-latest,   shell: pwsh }
    defaults:
      run:
        working-directory: powershell
        shell: ${{ matrix.shell }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 5
        with:
          persist-credentials: false
      - name: shell version
        timeout-minutes: 1
        run: $PSVersionTable | Format-List
      - name: test
        timeout-minutes: 5
        run: ${{ matrix.shell }} -NoProfile -File test/test.ps1
