name: pmsec ci
on:
  push:
    branches: [main]
    paths:
      - 'node/**'
      - 'python/**'
      - '.github/workflows/pmsec-ci.yml'
  pull_request:
    paths:
      - 'node/**'
      - 'python/**'
      - '.github/workflows/pmsec-ci.yml'
permissions: {}
jobs:
  node:
    timeout-minutes: 10
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22, 24]
    defaults:
      run:
        working-directory: node
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        timeout-minutes: 5
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        timeout-minutes: 5
        with:
          node-version: ${{ matrix.node }}
      - timeout-minutes: 5
        run: node --test
  python:
    timeout-minutes: 10
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ['3.10', '3.11', '3.12', '3.13']
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        timeout-minutes: 5
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        timeout-minutes: 5
      - name: pytest
        timeout-minutes: 5
        env:
          PY_VERSION: ${{ matrix.python }}
        run: uv run --python "$PY_VERSION" --with pytest pytest -q
