name: pmsec release npm
# Only dispatched by the `pmsec release` workflow. No tag trigger: release
# tags are pushed with GITHUB_TOKEN (which never triggers workflows), so a
# tag-triggered run could only ever be a manual tag push — blocked by design.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.12.0)'
        required: true
permissions:
  contents: read
  id-token: write
  attestations: write
jobs:
  publish:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: node
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        timeout-minutes: 5
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        timeout-minutes: 5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
      - name: Block direct manual dispatch
        timeout-minutes: 1
        env:
          ACTOR: ${{ github.actor }}
        run: |
          [ "$ACTOR" = "github-actions[bot]" ] || { echo "publish runs only via the 'pmsec release' workflow (actor: $ACTOR)" >&2; exit 1; }
      - name: Test
        timeout-minutes: 5
        run: node --test
      - name: Pack tarball
        timeout-minutes: 5
        run: npm pack
      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        timeout-minutes: 5
        with:
          subject-path: 'node/*.tgz'
      - name: Publish
        timeout-minutes: 5
        run: npm publish *.tgz --provenance --access public
