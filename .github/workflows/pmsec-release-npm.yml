name: pmsec release npm
on:
  push:
    tags:
      - 'pmsec-node-v*'
permissions:
  contents: read
  id-token: write
  attestations: write
jobs:
  publish:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: node
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        timeout-minutes: 5
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        timeout-minutes: 5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
      - name: Verify tag matches package.json version
        timeout-minutes: 5
        run: |
          tag_version="${GITHUB_REF_NAME#pmsec-node-v}"
          pkg_version=$(node -p "require('./package.json').version")
          [ "$tag_version" = "$pkg_version" ] || { echo "tag $tag_version != package.json $pkg_version" >&2; exit 1; }
      - name: Test
        timeout-minutes: 5
        run: node --test
      - name: Pack tarball
        timeout-minutes: 5
        run: npm pack
      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        timeout-minutes: 5
        with:
          subject-path: 'node/*.tgz'
      - name: Publish
        timeout-minutes: 5
        run: npm publish *.tgz --provenance --access public
