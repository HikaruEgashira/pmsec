name: pmsec release npm
on:
  push:
    tags:
      - 'pmsec-node-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.12.0)'
        required: true
permissions:
  contents: read
  id-token: write
  attestations: write
jobs:
  publish:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: node
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 5
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        timeout-minutes: 5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
      - name: Verify tag matches package.json version
        timeout-minutes: 5
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            tag_version="${{ github.event.inputs.version }}"
          else
            tag_version="${GITHUB_REF_NAME#pmsec-node-v}"
          fi
          pkg_version=$(node -p "require('./package.json').version")
          [ "$tag_version" = "$pkg_version" ] || { echo "tag $tag_version != package.json $pkg_version" >&2; exit 1; }
      - name: Test
        timeout-minutes: 5
        run: node --test
      - name: Pack tarball
        timeout-minutes: 5
        run: npm pack
      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        timeout-minutes: 5
        with:
          subject-path: 'node/*.tgz'
      - name: Publish
        timeout-minutes: 5
        run: npm publish *.tgz --provenance --access public
